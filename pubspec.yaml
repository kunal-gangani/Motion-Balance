name: motion_balance
description: "Software-assisted video stabilization for mobile creators."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  sensors_plus: ^4.0.2
  permission_handler: ^11.3.1
  flutter_riverpod: ^2.5.1
  video_player: ^2.11.1
  video_thumbnail: ^0.5.3
  path_provider: ^2.1.3
  path: ^1.9.0
  share_plus: ^13.0.0
  wakelock_plus: ^1.2.8
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - lib/Assets/Icons/