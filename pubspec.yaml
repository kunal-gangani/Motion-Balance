name: motion_balance
description: Software-based gimbal assistant for Flutter.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  camera: ^0.11.0
  sensors_plus: ^5.0.0
  ffmpeg_kit_flutter_full: ^6.0.3 
  video_player: ^2.8.1
  path_provider: ^2.1.1
  permission_handler: ^11.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0